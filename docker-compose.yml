services:
  postgres:
    image: postgres:16-alpine
    container_name: orivis-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: orivis
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d orivis"]
      interval: 5s
      timeout: 5s
      retries: 20
    volumes:
      - orivis-postgres-data:/var/lib/postgresql/data

volumes:
  orivis-postgres-data:
